services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ainote-community-db
    environment:
      POSTGRES_DB: ainote_community
      POSTGRES_USER: ainote
      POSTGRES_PASSWORD: ainote
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainote -d ainote_community"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: ainote-community-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ainote:ainote@db:5432/ainote_community
      DATA_DIR: /data
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8001:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ainote-community-frontend
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0 --port 3000
    restart: unless-stopped
